services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: plotpin-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: plotpin
    volumes:
      - plotpin_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d plotpin"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  plotpin_pg_data:
