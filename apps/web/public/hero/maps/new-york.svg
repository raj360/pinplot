<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" fill="none">
  <rect width="640" height="420" fill="#f1eee9"/>
  <!-- Central park -->
  <rect x="250" y="60" width="140" height="200" rx="12" fill="#c5dcc0" opacity="0.9"/>
  <!-- Hudson / water -->
  <path d="M0 0 L80 0 L60 420 L0 420Z" fill="#aad3df" opacity="0.75"/>
  <!-- Avenues -->
  <path d="M100 0 V420" stroke="#fff" stroke-width="13" stroke-linecap="round"/>
  <path d="M100 0 V420" stroke="#e0d9ce" stroke-width="7"/>
  <path d="M540 0 V420" stroke="#fff" stroke-width="12" stroke-linecap="round"/>
  <path d="M0 140 H640" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
  <path d="M0 140 H640" stroke="#e0d9ce" stroke-width="8"/>
  <path d="M0 300 H640" stroke="#fff" stroke-width="11" stroke-linecap="round"/>
  <!-- Cross streets -->
  <path d="M200 0 V420" stroke="#ebe4d8" stroke-width="3" opacity="0.7"/>
  <path d="M400 0 V420" stroke="#ebe4d8" stroke-width="3" opacity="0.7"/>
  <path d="M0 60 H640" stroke="#ebe4d8" stroke-width="2.5" opacity="0.6"/>
  <path d="M0 220 H640" stroke="#ebe4d8" stroke-width="2.5" opacity="0.6"/>
  <!-- Blocks -->
  <rect x="120" y="20" width="70" height="100" rx="2" fill="#e5ded3" opacity="0.8"/>
  <rect x="420" y="30" width="90" height="80" rx="2" fill="#e5ded3" opacity="0.75"/>
  <rect x="130" y="320" width="100" height="70" rx="2" fill="#e5ded3" opacity="0.8"/>
  <rect x="430" y="250" width="80" height="90" rx="2" fill="#e5ded3" opacity="0.75"/>
</svg>
