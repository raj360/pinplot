name: PlotPin cron jobs

on:
  schedule:
    # Hourly — release expired unit locks + notification reminders
    - cron: "15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: plotpin-cron
  cancel-in-progress: false

jobs:
  hourly:
    runs-on: ubuntu-latest
    steps:
      - name: Run hourly cron
        env:
          API_URL: ${{ secrets.PLOTPIN_API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$API_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Skip: set PLOTPIN_API_URL and CRON_SECRET repo secrets."
            exit 0
          fi
          curl -fsS -X POST "${API_URL%/}/api/v1/cron/hourly" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json"
